<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>콘텐츠/마케팅 대행사 맞춤형 통합 ERP 구축 · 1분 30초 자동 시연</title>

  <!-- Pretendard (한글 최적화) -->
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000; color: #f1f5f9;
      font-family: 'Pretendard Variable', system-ui, sans-serif;
      overflow: hidden;
    }
    .stage { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .frame-wrap { flex: 1; position: relative; overflow: hidden; background: #020617; }
    iframe {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1440px; height: 900px;
      border: 0;
    }

    .caption {
      position: absolute; left: 50%; bottom: 80px;
      transform: translateX(-50%);
      max-width: 720px; padding: 18px 28px;
      background: rgba(2, 6, 23, 0.92);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 12px;
      box-shadow: 0 12px 60px rgba(168, 85, 247, 0.25);
      backdrop-filter: blur(8px);
      opacity: 0; transition: opacity 0.5s ease;
      z-index: 10;
    }
    .caption.show { opacity: 1; }
    .caption .step-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      color: #c4b5fd; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .caption .step-text { font-size: 18px; line-height: 1.55; color: #f1f5f9; font-weight: 500; }

    .topbar { display: flex; align-items: center; gap: 16px; padding: 14px 24px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 20; }
    .topbar h1 { margin: 0; font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .topbar .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #64748b; }

    .progress-track { flex: 1; max-width: 400px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #ec4899); width: 0%; transition: width 0.3s ease; }
    .timecode { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #94a3b8; min-width: 80px; text-align: right; }

    .controls { display: flex; gap: 8px; }
    .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #f1f5f9; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn:hover { background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.4); }
    .btn.primary { background: linear-gradient(135deg, #a855f7, #ec4899); border: none; font-weight: 600; }

    .fake-cursor { position: absolute; width: 32px; height: 32px; pointer-events: none; z-index: 30; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8)); opacity: 0; }
    .fake-cursor.show { opacity: 1; }
    .click-pulse { position: absolute; pointer-events: none; z-index: 29; width: 56px; height: 56px; border: 3px solid #a855f7; border-radius: 50%; transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    .click-pulse.fire { animation: pulse 0.6s ease-out; }
    @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; } }

    .rec-hint { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); padding: 10px 18px; border-radius: 999px; background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.4); color: #fca5a5; font-size: 12px; font-family: 'JetBrains Mono', monospace; display: none; align-items: center; gap: 8px; z-index: 15; }
    .rec-hint.show { display: flex; }
    .rec-hint::before { content: ''; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: blink 1s infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="stage">
    <div class="topbar">
      <h1>콘텐츠/마케팅 대행사 맞춤형 통합 ERP 구축 · 자동 시연</h1>
      <span class="meta">위시켓 #156767</span>
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <span class="timecode" id="timecode">0:00 / 1분 30초</span>
      <div class="controls">
        <button class="btn" id="btn-restart">↻ 처음부터</button>
        <button class="btn primary" id="btn-play">▶ 재생</button>
      </div>
    </div>

    <div class="frame-wrap">
      <div class="rec-hint" id="rec-hint">REC · ⌘⇧5로 화면 녹화 시작 후 ▶ 재생을 눌러주세요</div>
      <!-- ⚠️ proto 경로: 신규 프로젝트는 ../proto/index.html 사용 -->
      <iframe id="proto" src="../proto/index.html"></iframe>

      <svg class="fake-cursor" id="cursor" viewBox="0 0 24 24">
        <path d="M3 3 L3 19 L8 14 L11 21 L14 20 L11 13 L18 13 Z" fill="#fff" stroke="#000" stroke-width="1" stroke-linejoin="round"/>
      </svg>
      <div class="click-pulse" id="pulse"></div>

      <div class="caption" id="caption">
        <div class="step-label" id="caption-label">STEP 0</div>
        <div class="step-text" id="caption-text">로딩 중…</div>
      </div>
    </div>
  </div>

  <script>
    // ===== Demo timeline 설정 =====
    // 90000 = 90초 (12 step 표준)
    const TOTAL_MS = 90000;

    const iframe = document.getElementById('proto');
    const captionEl = document.getElementById('caption');
    const captionLabel = document.getElementById('caption-label');
    const captionText = document.getElementById('caption-text');
    const cursor = document.getElementById('cursor');
    const pulse = document.getElementById('pulse');
    const progress = document.getElementById('progress');
    const timecode = document.getElementById('timecode');
    const recHint = document.getElementById('rec-hint');

    let playing = false;
    let startTime = 0;
    let rafId = null;

    const fmt = (ms) => { const s = Math.floor(ms / 1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };
    const setCaption = (label, text) => { captionLabel.textContent = label; captionText.textContent = text; captionEl.classList.add('show'); };
    const hideCaption = () => captionEl.classList.remove('show');
    const navIframe = (name) => { try { const win = iframe.contentWindow; if (win && win.__navigate) win.__navigate(name); } catch (e) { console.warn('nav failed', e); } };
    const moveCursor = (x, y) => { cursor.style.left = (x - 16) + 'px'; cursor.style.top = (y - 16) + 'px'; cursor.classList.add('show'); };
    const clickAt = (x, y) => { pulse.style.left = x + 'px'; pulse.style.top = y + 'px'; pulse.classList.remove('fire'); void pulse.offsetWidth; pulse.classList.add('fire'); };
    const hideCursor = () => cursor.classList.remove('show');

    // ===== Timeline (#156767 통합 ERP · 90초 12스텝) =====
    // 각 step: { at: ms, label, text, action?: () => void }
    // ⚠️ at 시점에 action 실행 + caption 표시 (캡션 50~80자)
    // fake cursor는 화면 전환 클릭 위치(사이드바 메뉴)만 — Step 3·8·10
    const timeline = [
      { at: 500,    label: 'INTRO · 0:00',       text: '위시켓 156767 콘텐츠/마케팅 대행사 통합 ERP — 9화면 관리자 콘솔입니다. 모든 수치는 데모 데이터입니다.' },
      { at: 6000,   label: '01 · 대시보드',       text: '주문·작업·결재·정산이 한 화면에 — 매출·손익·납기준수율·처리량 4개 KPI를 실시간으로 봅니다.' },
      { at: 12000,  label: '02 · 환불 결재 콘솔', text: '환불 요청 처리 — 전자결재 기안을 4단계 위저드로 작성합니다. 가장 자주 쓰는 화면입니다.', action: () => { navIframe('console'); moveCursor(120, 302); clickAt(120, 302); } },
      { at: 18000,  label: 'STEP 1 · 주문 조회',  text: '환불 요청이 들어온 주문을 조회하고 현재 금액·작업 진행 상태·기존 환불 이력을 확인합니다.' },
      { at: 24000,  label: 'STEP 2 · 환불 금액',  text: '부분환불 금액을 입력하면 차감 매출과 새 정산 예상액이 즉시 재계산됩니다. 수기 엑셀 없이요.' },
      { at: 30000,  label: 'STEP 3 · 승인선 ★',  text: '★ 승인선은 설정으로 관리 — Tweaks에서 순차 결재↔병렬 합의를 전환하면 화면이 실제로 달라집니다.' },
      { at: 38000,  label: 'STEP 4 · 7연쇄 확인', text: '상신 전에 승인 시 함께 일어날 7가지 후속 처리 — 결재·주문·매출·정산·손익·이력·알림을 미리 확인합니다.' },
      { at: 45000,  label: '03 · 이력 · 수집',    text: 'API 수집이 실패해도 업무는 멈추지 않습니다 — 엑셀 업로드 대체 수집으로 45건 중 43건을 등록했습니다.', action: () => { navIframe('history'); moveCursor(120, 524); clickAt(120, 524); } },
      { at: 52000,  label: '03 · 감사 로그',      text: '행을 클릭하면 감사 로그가 열립니다 — 모든 변경이 기록되고, 반려된 결재는 데이터를 바꾸지 않습니다.' },
      { at: 62000,  label: '04 · 결재 양식',      text: '결재 양식 5종 — 주문수정·부분환불·전체환불·재결제·단가변경을 템플릿으로 표준화해 관리합니다.', action: () => { navIframe('templates'); moveCursor(120, 342); clickAt(120, 342); } },
      { at: 70000,  label: '04 · 라이브 프리뷰',  text: '양식을 수정하면 우측 기안문 미리보기가 디바운스 없이 즉시 반영됩니다. 승인선도 함께 바뀝니다.' },
      { at: 78000,  label: 'OUTRO',               text: '17주 실행계획으로 120일 안에 완주합니다. 미팅에서 실제 사례 기반으로 자세히 시연드리겠습니다. 감사합니다.', action: () => { navIframe('dashboard'); hideCursor(); } },
    ];

    let timeline_fired = new Set();

    function tick() {
      if (!playing) return;
      const elapsed = Date.now() - startTime;
      const pct = Math.min(100, (elapsed / TOTAL_MS) * 100);
      progress.style.width = pct + '%';
      timecode.textContent = `${fmt(elapsed)} / 1분 30초`;

      for (const step of timeline) {
        if (elapsed >= step.at && !timeline_fired.has(step.at)) {
          timeline_fired.add(step.at);
          if (step.action) try { step.action(); } catch (e) {}
          setCaption(step.label, step.text);
        }
      }

      if (elapsed >= TOTAL_MS) {
        playing = false;
        document.getElementById('btn-play').textContent = '▶ 재생';
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function play() {
      if (playing) {
        playing = false;
        cancelAnimationFrame(rafId);
        document.getElementById('btn-play').textContent = '▶ 재생';
        recHint.classList.remove('show');
        return;
      }
      timeline_fired.clear();
      navIframe('dashboard');
      progress.style.width = '0%';
      hideCaption();
      setTimeout(() => {
        playing = true;
        startTime = Date.now();
        document.getElementById('btn-play').textContent = '⏸ 일시정지';
        recHint.classList.add('show');
        setTimeout(() => recHint.classList.remove('show'), 4000);
        tick();
      }, 300);
    }

    function restart() {
      playing = false;
      cancelAnimationFrame(rafId);
      timeline_fired.clear();
      navIframe('dashboard');
      progress.style.width = '0%';
      timecode.textContent = '0:00 / 1분 30초';
      hideCaption();
      hideCursor();
      document.getElementById('btn-play').textContent = '▶ 재생';
    }

    document.getElementById('btn-play').addEventListener('click', play);
    document.getElementById('btn-restart').addEventListener('click', restart);

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        setCaption('READY', '▶ 재생 버튼을 눌러 자동 시연을 시작하세요. ⌘⇧5로 화면 녹화 가능.');
      }, 800);
    });
  </script>
</body>
</html>
